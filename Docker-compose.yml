services:
  api:
    build: ./backend
    container_name: projet_clementine_back
    ports:
      - "3000:3000"
      - "9229:9229"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
    volumes:
      - ./backend/src:/app/src
      - /app/node_modules # Empêche le partage des node_modules entre hôte et conteneur
    #permet d'attacher un debugger à nodemon
    #command: nodemon --exec "node --inspect=0.0.0.0:9229 -r ts-node/register" src/index.ts 
    command: npm run start

  frontend:
    build: ./frontend
    container_name: projet_clementine_front
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

  postgres:
    image: postgres:latest
    container_name: projet_clementine_BDD
    restart: always
    ports:
      - "5466:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: mydatabase
    volumes:
      - postgres-data:/var/lib/postgresql

volumes:
  postgres-data:
