services:
  api:
    build: ./backend
    container_name: projet_clementine_back
    ports:
      - "3000:3000"
      - "9229:9229"
    env_file:
      - .env
    depends_on:
      - postgres
    volumes:
      - ./backend/src:/app/src
      - /app/node_modules # Empêche le partage des node_modules entre hôte et conteneur
    command: npm run start

  postgres:
    image: postgres:latest
    container_name: projet_clementine_BDD
    restart: always
    ports:
      - "5466:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: mydatabase
    volumes:
      - postgres-data:/var/lib/postgresql

volumes:
  postgres-data:
